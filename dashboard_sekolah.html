<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schola | Admin Panel</title>
    <style>
      :root {
        --sidebar-bg: #ffffff;
        --text-main: #1a1a1a;
        --text-muted: #64748b;
        --accent: #005a9e;
        --border-color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
        background: #f4f7f9;
      }

      /* Sidebar Tetap di Samping */
      aside {
        width: 260px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        padding: 25px;
        z-index: 10;
      }

      .logo {
        font-weight: 800;
        font-size: 1.6rem;
        color: var(--accent);
        text-decoration: none;
        margin-bottom: 40px;
        text-transform: lowercase;
      }

      .nav-menu {
        list-style: none;
        flex-grow: 1;
      }
      .nav-item {
        margin-bottom: 8px;
      }

      .nav-link {
        display: block;
        padding: 12px 15px;
        text-decoration: none;
        color: var(--text-muted);
        border-radius: 6px;
        font-weight: 500;
        transition: all 0.2s;
        font-size: 13px;
      }

      .nav-link:hover {
        background-color: #f0f7ff;
        color: var(--accent);
      }

      /* Kontainer Iframe */
      .main-wrapper {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <aside>
      <a href="index.html" class="logo">schola.</a>
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="dashboard_home.html" target="contentFrame" class="nav-link"
            >Dashboard Utama</a
          >
        </li>
        <li class="nav-item">
          <a href="kelola_berita.html" target="contentFrame" class="nav-link"
            >Berita & Artikel</a
          >
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link">Galeri Karya</a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link">Pengumuman</a>
        </li>
      </ul>
      <div style="border-top: 1px solid var(--border-color); padding-top: 20px">
        <a href="index.html" class="nav-link" style="color: #e11d48">Keluar</a>
      </div>
    </aside>

    <div class="main-wrapper">
      <iframe name="contentFrame" src="dashboard_home.html"></iframe>
    </div>
  </body>
</html>
